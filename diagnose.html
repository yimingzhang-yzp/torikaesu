<main class="diag-wrap" id="diagApp">

  <!-- PROGRESS -->
  <div class="diag-progress-wrap" id="progressWrap">
    <div class="diag-progress"><div class="diag-progress-bar" id="progressBar"></div></div>
    <div class="diag-step-info"><span id="stepCounter">STEP 1 / 1</span></div>
  </div>

  <!-- WELCOME -->
  <section class="diag-step diag-welcome active" data-step="welcome">
    <span class="eyebrow">Hearing for Complaint Drafting</span>
    <h1>ご入力内容をもとに、弁護士が訴状を作成します</h1>
    <p class="diag-sub">トリカエスは、提携する弁護士事務所が少額訴訟の訴状作成までを行うサービスです。正確な訴状を作成するため、弁護士の視点で必要な項目をうかがいます。ご回答後に連絡先をご入力いただくと、弁護士が訴状を作成し、ご連絡いたします。</p>
    <div class="diag-features">
      <div class="diag-feat">訴状の作成まで対応</div>
      <div class="diag-feat">弁護士がレビュー</div>
      <div class="diag-feat">入力情報は厳重に管理</div>
      <div class="diag-feat">事件類型に応じた様式</div>
    </div>
    <button class="diag-start" data-action="start">ヒアリングを始める →</button>
  </section>

  <!-- DYNAMIC QUESTION (設定駆動で diagnose.js が描画) -->
  <section class="diag-step" data-step="dynamic" id="dynamicStep"></section>

</main>
